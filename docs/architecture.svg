  <text x="890" y="318" class="sub">RAW (Bronze)</text>

  <path class="arrow" d="M190,310 H230" />
  <path class="arrow" d="M400,310 H440" />
  <path class="arrow" d="M620,310 H660" />
  <path class="arrow" d="M840,310 H880" />

  <rect x="880" y="380" width="150" height="55" class="box p2" />
  <text x="890" y="403" class="label">dbt Silver</text>
  <text x="890" y="418" class="sub">CLEAN schema</text>

  <rect x="880" y="460" width="150" height="55" class="box p2" />
  <text x="890" y="483" class="label">dbt Gold</text>
  <text x="890" y="498" class="sub">ANALYTICS schema</text>

  <path class="arrow" d="M955,340 V380" />
  <path class="arrow" d="M955,435 V460" />

  <rect x="660" y="460" width="180" height="55" class="box p2" />
  <text x="670" y="483" class="label">Streamlit Dashboard</text>
  <text x="670" y="498" class="sub">reads Gold layer</text>

  <path class="arrow" d="M880,487 H840" />

  <rect x="440" y="460" width="180" height="55" class="box p2" />
  <text x="450" y="482" class="label">Lambda</text>
  <text x="450" y="498" class="sub">Snowflake to Timestream</text>

  <path class="arrow" d="M660,487 H620" />

  <rect x="230" y="460" width="170" height="55" class="box p2" />
  <text x="240" y="482" class="label">AWS Timestream</text>

  <path class="arrow" d="M440,487 H400" />

  <rect x="20" y="460" width="170" height="55" class="box p2" />
  <text x="30" y="482" class="label">Grafana</text>
  <text x="30" y="498" class="sub">time-series charts</text>

  <path class="arrow" d="M230,487 H190" />

  <text x="20" y="580" class="sub">Bonus path (Task 2.5): Snowflake → Lambda → Timestream → Grafana, in parallel with the Streamlit path.</text>
</svg>
